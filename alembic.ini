# Alembic configuration file
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Encoding for .py migration files
prepend_sys_path = .

# Timezone used when generating migration timestamps
# timezone =

# Max length of the slug field in the filename
truncate_slug_length = 40

# SQLAlchemy connection URL.
# Override via DATABASE_URL environment variable in env.py (see alembic/env.py).
sqlalchemy.url = postgresql://medistock:medistock@localhost:5432/medistock


[post_write_hooks]
# Hooks to run on newly generated migration files (e.g. black, isort)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
